name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: adsignal
          MONGO_INITDB_ROOT_PASSWORD: adsignal
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URI: mongodb://adsignal:adsignal@localhost:27017/adsignal?authSource=admin
      MONGO_DB: adsignal
      ICEBERG_REST_URI: http://localhost:8181/catalog
      ICEBERG_WAREHOUSE: s3://adsignal-warehouse/
      ICEBERG_S3_ENDPOINT: http://localhost:9000
      ICEBERG_S3_ACCESS_KEY: minioadmin
      ICEBERG_S3_SECRET_KEY: minioadmin
      LLM_PROVIDER: ollama
      LLM_MODEL: llama3.2

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java 17 (required by PySpark 4.x)
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check adsignal/ api/ dashboard/ tests/

      - name: Type check (mypy)
        run: mypy adsignal/ api/ --ignore-missing-imports

      - name: Security gate (ECC unicode-safety scan)
        run: python scripts/ecc_security_scan.py

      - name: Run tests
        run: |
          mkdir -p test-results
          pytest tests/ -v --tb=short --junitxml=test-results/pytest.xml

      - name: Upload test results
        if: always() && hashFiles('test-results/pytest.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: test-results/pytest.xml
