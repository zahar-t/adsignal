services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: adsignal-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: adsignal-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/adsignal-warehouse --ignore-existing;
      mc anonymous set download local/adsignal-warehouse;
      exit 0;
      "

  postgres:
    image: postgres:16-alpine
    container_name: adsignal-postgres
    environment:
      POSTGRES_DB: lakekeeper
      POSTGRES_USER: lakekeeper
      POSTGRES_PASSWORD: lakekeeper
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper"]
      interval: 5s
      timeout: 3s
      retries: 10

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.12.2
    container_name: adsignal-lakekeeper-migrate
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: "adsignal-dev-key-32chars-padding!"
      LAKEKEEPER__PG_DATABASE_URL_READ: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"
      LAKEKEEPER__PG_DATABASE_URL_WRITE: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"

  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.12.2
    container_name: adsignal-lakekeeper
    command: serve
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: "adsignal-dev-key-32chars-padding!"
      LAKEKEEPER__PG_DATABASE_URL_READ: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"
      LAKEKEEPER__PG_DATABASE_URL_WRITE: "postgresql://lakekeeper:lakekeeper@postgres:5432/lakekeeper"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: adsignal-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: adsignal
      MONGO_INITDB_ROOT_PASSWORD: adsignal
      MONGO_INITDB_DATABASE: adsignal
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  minio_data:
  postgres_data:
  mongo_data:
